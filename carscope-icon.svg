<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0F172A"/>
  <!-- Scope ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#C1121F" stroke-width="1.8"/>
  <!-- Crosshair ticks -->
  <line x1="16" y1="4"  x2="16" y2="8"  stroke="#C1121F" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="16" y2="24" stroke="#C1121F" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="4"  y1="16" x2="8"  y2="16" stroke="#C1121F" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="24" y2="16" stroke="#C1121F" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Car body -->
  <rect x="6" y="17" width="20" height="5" rx="1.5" fill="white"/>
  <!-- Cabin -->
  <polygon points="9.5,17 12,12 20,12 22.5,17" fill="white"/>
  <!-- Front wheel -->
  <circle cx="10" cy="22.5" r="3" fill="#0F172A"/>
  <circle cx="10" cy="22.5" r="1.2" fill="#C1121F"/>
  <!-- Rear wheel -->
  <circle cx="22" cy="22.5" r="3" fill="#0F172A"/>
  <circle cx="22" cy="22.5" r="1.2" fill="#C1121F"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#C1121F"/>
</svg>
